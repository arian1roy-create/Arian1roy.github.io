<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arian Roy Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

/* TOP */
.topbar{
background:#111;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.lang-btn{
background:white;
color:black;
padding:6px 12px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

/* HERO */
.hero{
text-align:center;
background:#111;
padding:15px;
}

.hero img{
width:200px;
animation:pulse 0.4s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:15px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
text-align:center;
text-decoration:none;
color:black;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:160px;
object-fit:contain;
}

.card h3{
font-size:14px;
margin:10px 0;
}

.btn{
display:inline-block;
margin-bottom:10px;
padding:6px 12px;
background:black;
color:white;
border-radius:8px;
font-size:12px;
text-decoration:none;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
<a class="lang-btn" href="index.html">🇮🇷 FA</a>
<span>Store</span>
</div>

<!-- LOGO -->
<div class="hero">
<img src="file_00000000bfec720a9ea8aa8800b40ffb.png">
</div>

<!-- PRODUCTS -->
<section class="products">

<a class="card" href="iphone.html">
<img src="https://m.media-amazon.com/images/I/51k0qRQFcuL.jpg">
<h3>iPhone 17 Pro Max</h3>
<div class="btn">View</div>
</a>

<a class="card" href="macbook.html">
<img src="https://m.media-amazon.com/images/I/51QPBmoc8FL.jpg">
<h3>MacBook A18 Pro</h3>
<div class="btn">View</div>
</a>

<a class="card" href="watch.html">
<img src="https://m.media-amazon.com/images/I/61RGZdmKzRL.jpg">
<h3>Apple Watch Ultra 4</h3>
<div class="btn">View</div>
</a>

<a class="card" href="imac.html">
<img src="https://m.media-amazon.com/images/I/51C8kxOdz-L.jpg">
<h3>iMac Pro 2026</h3>
<div class="btn">View</div>
</a>

</section>

<!-- CART -->
<div id="cartBar">

<div id="overlay" onclick="closeCart()" style="
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.5);
display:none;
z-index:99;"></div>

<div onclick="toggleCart()" style="
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
z-index:100;
border-top-left-radius:15px;
border-top-right-radius:15px;
font-weight:bold;
cursor:pointer;">
🛒 Cart (<span id="count">0</span>)
<span>▲</span>
</div>

<div id="cartBody" style="
display:none;
position:fixed;
bottom:50px;
left:0;
right:0;
background:#1a1a1a;
color:white;
padding:10px;
z-index:101;
max-height:60vh;
overflow:auto;
border-top:1px solid #333;
">

<div id="cartItems"></div>

<p>💰 Total: $<span id="total">0</span></p>

<button onclick="checkout()" style="
width:100%;
padding:12px;
background:#25D366;
color:white;
border:none;
border-radius:10px;
font-weight:bold;">
Checkout via Telegram
</button>

<button onclick="clearCart()" style="
width:100%;
padding:10px;
margin-top:5px;
background:#444;
color:white;
border:none;
border-radius:10px;">
Clear Cart
</button>

</div>
</div>

<script src="cart.js"></script>

</body>
</html>
