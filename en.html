<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arian Roy Store</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">

<style>
body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

/* TOP */
.topbar{
background:#111;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.lang-btn button{
padding:6px 10px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

/* HERO */
.hero{
text-align:center;
background:#111;
padding:15px;
}

.hero img{
width:170px;
animation:pulse 0.4s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:15px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
text-align:center;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:160px;
object-fit:contain;
}

.card h3{
margin:10px 0;
font-size:14px;
}

.btn{
display:inline-block;
margin-bottom:10px;
padding:6px 12px;
background:black;
color:white;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
<span id="title">Arian Roy Store</span>

<div class="lang-btn">
<button onclick="setLang('fa')">FA</button>
<button onclick="setLang('en')">EN</button>
</div>
</div>

<!-- HERO -->
<div class="hero">
<img src="file_00000000bfec720a9ea8aa8800b40ffb.png">
</div>

<!-- PRODUCTS -->
<section class="products">

<div class="card">
<img src="https://m.media-amazon.com/images/I/51k0qRQFcuL.jpg">
<h3 id="iphone">iPhone 17 Pro Max</h3>
<div class="btn" onclick="addToCart('iPhone 17 Pro Max',1299)">View</div>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/51QPBmoc8FL.jpg">
<h3 id="mac">MacBook A18 Pro</h3>
<div class="btn" onclick="addToCart('MacBook A18 Pro',1299)">View</div>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/61RGZdmKzRL.jpg">
<h3 id="watch">Apple Watch Ultra 4</h3>
<div class="btn" onclick="addToCart('Apple Watch Ultra 4',799)">View</div>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/51C8kxOdz-L.jpg">
<h3 id="imac">iMac Pro 2026</h3>
<div class="btn" onclick="addToCart('iMac Pro 2026',1799)">View</div>
</div>

</section>

<!-- CART -->
<div id="overlay" onclick="closeCart()"></div>

<div id="cartBar">

<div id="cartHeader" onclick="toggleCart()">
🛒 <span id="cartText">Cart</span>
(<span id="count">0</span>)
</div>

<div id="cartBody">

<div id="cartItems"></div>

<p>💰 Total: $<span id="total">0</span></p>

<button onclick="checkout()" style="
width:100%;
padding:12px;
background:#25D366;
color:white;
border:none;
border-radius:10px;
font-weight:bold;">
Checkout Telegram
</button>

<button onclick="clearCart()" style="
width:100%;
padding:10px;
margin-top:5px;
background:#444;
color:white;
border:none;
border-radius:10px;">
Clear Cart
</button>

</div>
</div>

<script src="cart.js"></script>

<script>
function toggleCart(){
let b=document.getElementById("cartBody");
let o=document.getElementById("overlay");

if(b.style.display==="block"){
b.style.display="none";
o.style.display="none";
}else{
b.style.display="block";
o.style.display="block";
}
}

function closeCart(){
document.getElementById("cartBody").style.display="none";
document.getElementById("overlay").style.display="none";
}

const texts={
fa:{title:"فروشگاه آریان روی",cart:"سبد خرید"},
en:{title:"Arian Roy Store",cart:"Cart"}
};

function setLang(l){
document.getElementById("title").innerText=texts[l].title;
document.getElementById("cartText").innerText=texts[l].cart;
}
</script>

</body>
</html>
