<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* HEADER */
.header{
position:sticky;
top:0;
background:#fff;
padding:10px;
display:flex;
align-items:center;
gap:10px;
z-index:10;
border-bottom:1px solid #ddd;
}

.logo{
font-weight:bold;
color:#e60012;
}

.search{
flex:1;
padding:8px;
border:1px solid #ddd;
border-radius:8px;
}

.lang button{
border:none;
padding:6px 8px;
border-radius:6px;
cursor:pointer;
background:#eee;
}

/* CATEGORY */
.cat{
display:flex;
gap:8px;
overflow:auto;
padding:10px;
background:#fff;
border-bottom:1px solid #eee;
}

.cat div{
background:#f0f0f0;
padding:6px 10px;
border-radius:20px;
font-size:12px;
white-space:nowrap;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#fff;
border-radius:12px;
padding:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
text-align:center;
}

.card img{
width:100%;
height:130px;
object-fit:contain;
}

.card h3{
font-size:13px;
margin:8px 0;
}

.price{
color:#e60012;
font-weight:bold;
margin-bottom:5px;
}

.card button{
background:#e60012;
color:#fff;
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
width:100%;
}

/* CART */
.cart{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
color:#fff;
padding:10px;
z-index:20;
border-top-left-radius:15px;
border-top-right-radius:15px;
}

.cart button{
width:100%;
margin-top:6px;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

.pay{
background:#25D366;
color:#fff;
}

.clear{
background:#444;
color:#fff;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="logo">🛍 AR Store</div>

<input class="search" placeholder="Search products...">

<div class="lang">
<button onclick="setLang('fa')">FA</button>
<button onclick="setLang('en')">EN</button>
</div>
</div>

<!-- CATEGORY -->
<div class="cat">
<div>📱 Phone</div>
<div>💻 Laptop</div>
<div>⌚ Watch</div>
<div>🖥 iMac</div>
</div>

<!-- PRODUCTS -->
<div class="products">

<div class="card">
<img src="https://m.media-amazon.com/images/I/51k0qRQFcuL.jpg">
<h3 id="iphone">iPhone 17 Pro Max</h3>
<div class="price">$1299</div>
<button onclick="addToCart('iPhone 17 Pro Max',1299)">Add to Cart</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/51QPBmoc8FL.jpg">
<h3 id="mac">MacBook A18 Pro</h3>
<div class="price">$1299</div>
<button onclick="addToCart('MacBook A18 Pro',1299)">Add to Cart</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/61RGZdmKzRL.jpg">
<h3 id="watch">Apple Watch Ultra 4</h3>
<div class="price">$799</div>
<button onclick="addToCart('Apple Watch Ultra 4',799)">Add to Cart</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/51C8kxOdz-L.jpg">
<h3 id="imac">iMac Pro 2026</h3>
<div class="price">$1799</div>
<button onclick="addToCart('iMac Pro 2026',1799)">Add to Cart</button>
</div>

</div>

<!-- CART -->
<div class="cart">
🛒 <span id="cartText">Cart</span> (<span id="count">0</span>)
<div>💰 Total: $<span id="total">0</span></div>

<button class="pay" onclick="checkout()">Checkout Telegram</button>
<button class="clear" onclick="clearCart()">Clear</button>
</div>

<script>
let cart=[];

function addToCart(name,price){
cart.push({name,price});
update();
}

function update(){
document.getElementById("count").innerText=cart.length;
let total=0;
cart.forEach(i=>total+=i.price);
document.getElementById("total").innerText=total;
}

function clearCart(){
cart=[];
update();
}

function checkout(){
if(cart.length===0){
alert("Cart is empty!");
return;
}

let msg="🛒 New Order%0A%0A";
let total=0;

cart.forEach(i=>{
msg+="• "+i.name+" - $"+i.price+"%0A";
total+=i.price;
});

msg+="%0A💰 Total: $"+total;

window.open("https://t.me/iphonearian?text="+msg,"_blank");
}

/* LANG */
const t={
fa:{cart:"سبد خرید",iphone:"آیفون 17 پرو مکس",mac:"مک‌بوک A18 پرو",watch:"اپل واچ",imac:"آی‌مک"},
en:{cart:"Cart",iphone:"iPhone 17 Pro Max",mac:"MacBook A18 Pro",watch:"Apple Watch Ultra 4",imac:"iMac Pro 2026"}
};

function setLang(l){
document.getElementById("cartText").innerText=t[l].cart;
}
</script>

</body>
</html>
