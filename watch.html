<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Watch</title>
<style>
body{font-family:tahoma;text-align:center;background:#f4f4f4}
.box{background:white;width:260px;margin:10px auto;padding:15px;border-radius:12px}
button{padding:8px 15px;background:black;color:white;border:none;border-radius:8px}
</style>
</head>
<body>

<h1>Apple Watch</h1>

<div class="box">
<p>GPS - $699</p>
<button onclick="buy('Watch GPS',699)">Buy</button>
</div>

<div class="box">
<p>LTE - $799</p>
<button onclick="buy('Watch LTE',799)">Buy</button>
</div>

<script>
function buy(n,p){
window.open("https://t.me/iphonearian?text="+n+" - $"+p,"_blank");
}
</script>

</body>
</html>
