<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Store Pro</title>

<style>
body{
margin:0;
font-family:tahoma;
background:#f2f4f6;
}

.header{
position:sticky;
top:0;
background:#fff;
display:flex;
align-items:center;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #ddd;
}

.logo{
font-size:18px;
font-weight:bold;
color:#e60012;
}

.search{
flex:1;
margin:0 10px;
padding:8px;
border:1px solid #ddd;
border-radius:8px;
}

.lang{
background:#111;
color:#fff;
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#fff;
border-radius:12px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
height:130px;
object-fit:contain;
}

.price{
color:#e60012;
font-weight:bold;
}

.card button{
background:#e60012;
color:#fff;
border:none;
padding:6px;
border-radius:8px;
width:100%;
cursor:pointer;
}

.cart{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
color:#fff;
padding:10px;
}

.cart-items{
max-height:120px;
overflow:auto;
font-size:12px;
margin:5px 0;
}

.item{
display:flex;
justify-content:space-between;
margin:3px 0;
}

.item button{
background:red;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

.pay,.clear{
width:100%;
padding:10px;
border:none;
border-radius:8px;
color:white;
margin-top:5px;
cursor:pointer;
}

.pay{background:#25D366}
.clear{background:#444}
</style>
</head>

<body>

<div class="header">

<div class="logo" id="logo">🛍 AR Store Pro</div>

<input id="search" class="search" placeholder="Search..." onkeyup="searchProducts()">

<button class="lang" onclick="toggleLang()">🌐</button>

</div>

<div class="products">

<div class="card">
<img src="https://m.media-amazon.com/images/I/51k0qRQFcuL.jpg">
<h3>iPhone 17 Pro Max</h3>
<div class="price">$1299</div>
<button onclick="add('iPhone 17 Pro Max',1299)">Add</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/51QPBmoc8FL.jpg">
<h3>MacBook A18 Pro</h3>
<div class="price">$1299</div>
<button onclick="add('MacBook A18 Pro',1299)">Add</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/61RGZdmKzRL.jpg">
<h3>Apple Watch Ultra 4</h3>
<div class="price">$799</div>
<button onclick="add('Apple Watch Ultra 4',799)">Add</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/51C8kxOdz-L.jpg">
<h3>iMac Pro 2026</h3>
<div class="price">$1799</div>
<button onclick="add('iMac Pro 2026',1799)">Add</button>
</div>

</div>

<div class="cart">

🛒 <span id="cartText">Cart</span> (<span id="count">0</span>)<br>

<div class="cart-items" id="cartItems"></div>

Total: $<span id="total">0</span>

<button class="pay" onclick="checkout()">Checkout</button>
<button class="clear" onclick="clearCart()">Clear</button>

</div>

<script>

let cart=[];
let lang="en";

/* ADD */
function add(name,price){
cart.push({name,price});
update();
}

/* UPDATE */
function update(){
document.getElementById("count").innerText=cart.length;

let total=0;
cart.forEach(i=>total+=i.price);
document.getElementById("total").innerText=total;

let html="";
cart.forEach((i,index)=>{
html+=`
<div class="item">
<span>${i.name}</span>
<span>$${i.price}</span>
<button onclick="removeItem(${index})">x</button>
</div>`;
});

document.getElementById("cartItems").innerHTML=html;
}

function removeItem(i){
cart.splice(i,1);
update();
}

function clearCart(){
cart=[];
update();
}

/* ✔ FIXED CHECKOUT (TELEGRAM) */
function checkout(){

if(cart.length===0){
alert(lang==="en" ? "Cart empty" : "سبد خرید خالی است");
return;
}

let text="🛒 New Order\n\n";
let total=0;

cart.forEach(i=>{
text+="• "+i.name+" - $"+i.price+"\n";
total+=i.price;
});

text+="\n💰 Total: $"+total;

/* GUARANTEED OPEN */
window.location.href =
"https://t.me/iphonearian?text=" + encodeURIComponent(text);
}

/* ✔ FIXED LANGUAGE */
function toggleLang(){

if(lang==="en"){
lang="fa";

document.getElementById("logo").innerText="🛍 فروشگاه حرفه‌ای";
document.getElementById("search").placeholder="جستجو...";
document.getElementById("cartText").innerText="سبد";

document.querySelectorAll(".pay").forEach(b=>b.innerText="پرداخت");
document.querySelectorAll(".clear").forEach(b=>b.innerText="پاک کردن");

}else{
lang="en";

document.getElementById("logo").innerText="🛍 AR Store Pro";
document.getElementById("search").placeholder="Search...";
document.getElementById("cartText").innerText="Cart";

document.querySelectorAll(".pay").forEach(b=>b.innerText="Checkout");
document.querySelectorAll(".clear").forEach(b=>b.innerText="Clear");
}
}

</script>

</body>
</html>
