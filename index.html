<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فروشگاه آریان روی</title>

<style>
body{
margin:0;
font-family:tahoma;
background:#f4f4f4;
}

/* TOP */
.topbar{
background:#111;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.lang-btn{
background:white;
color:black;
padding:6px 12px;
border-radius:6px;
text-decoration:none;
}

/* LOGO */
.logo{
width:200px;
animation:pulse 0.4s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

/* PRODUCTS */
.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
padding:20px;
}

.card{
width:260px;
background:white;
border-radius:12px;
overflow:hidden;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-decoration:none;
color:black;
}

.card img{
width:100%;
height:200px;
object-fit:contain;
}

.card h3{
margin:10px 0;
}

/* CART */
#cartBar{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
color:white;
}

#cartHeader{
padding:12px;
display:flex;
justify-content:space-between;
cursor:pointer;
}

#cartBody{
display:none;
background:#1a1a1a;
padding:10px;
}

button{
background:#25D366;
color:white;
border:none;
padding:10px;
width:100%;
margin-top:5px;
border-radius:6px;
}
</style>
</head>

<body>

<div class="topbar">
<a class="lang-btn" href="en.html">🇬🇧 EN</a>
</div>

<div style="text-align:center;background:#111;padding:10px">
<img src="file_00000000bfec720a9ea8aa8800b40ffb.png" class="logo">
</div>

<!-- PRODUCTS -->
<section class="products">

<a class="card" href="iphone.html">
<img src="https://m.media-amazon.com/images/I/51k0qRQFcuL.jpg">
<h3>iPhone 17 Pro Max</h3>
</a>

<a class="card" href="macbook.html">
<img src="https://m.media-amazon.com/images/I/51QPBmoc8FL.jpg">
<h3>MacBook A18 Pro</h3>
</a>

<a class="card" href="watch.html">
<img src="https://m.media-amazon.com/images/I/61RGZdmKzRL.jpg">
<h3>Apple Watch Ultra 4</h3>
</a>

<a class="card" href="imac.html">
<img src="https://m.media-amazon.com/images/I/51C8kxOdz-L.jpg">
<h3>iMac Pro 2026</h3>
</a>

</section>

<!-- CART -->
<div id="cartBar">

<div id="cartHeader" onclick="toggleCart()">
🛒 Cart (<span id="count">0</span>)
<span>▲</span>
</div>

<div id="cartBody">

<div id="cartItems"></div>

<p>Total: $<span id="total">0</span></p>

<button onclick="checkout()">Send to Telegram</button>

</div>

</div>

<script src="cart.js"></script>

<script>
function toggleCart(){
let b=document.getElementById("cartBody");
b.style.display = b.style.display==="block"?"none":"block";
}
</script>

</body>
</html>
