<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Store Pro</title>

<style>
body{
margin:0;
font-family:tahoma;
background:#f2f4f6;
}

.header{
position:sticky;
top:0;
background:#fff;
display:flex;
align-items:center;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #ddd;
}

.logo{
font-size:18px;
font-weight:bold;
color:#e60012;
}

.search{
flex:1;
margin:0 10px;
padding:8px;
border:1px solid #ddd;
border-radius:8px;
}

.lang{
background:#111;
color:#fff;
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#fff;
border-radius:12px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
height:130px;
object-fit:contain;
}

.price{
color:#e60012;
font-weight:bold;
}

.card button{
background:#e60012;
color:#fff;
border:none;
padding:6px;
border-radius:8px;
width:100%;
cursor:pointer;
}

.cart{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
color:#fff;
padding:10px;
}

.cart-items{
max-height:120px;
overflow:auto;
font-size:12px;
margin:5px 0;
}

.item{
display:flex;
justify-content:space-between;
margin:3px 0;
}

.item button{
background:red;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

.pay,.clear{
width:100%;
padding:10px;
border:none;
border-radius:8px;
color:white;
margin-top:5px;
cursor:pointer;
}

.pay{background:#25D366}
.clear{background:#444}

/* PAYMENT MODAL */
#payBox{
display:none;
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.6);
z-index:999;
}

.payInner{
background:#fff;
max-width:380px;
margin:80px auto;
padding:20px;
border-radius:12px;
text-align:center;
}
</style>
</head>

<body>

<div class="header">

<div class="logo" id="logo">🛍 AR Store Pro</div>

<input id="search" class="search" placeholder="Search..." onkeyup="searchProducts()">

<button class="lang" onclick="toggleLang()">🌐</button>

</div>

<div class="products">

<div class="card">
<img src="https://m.media-amazon.com/images/I/51k0qRQFcuL.jpg">
<h3>iPhone 17 Pro Max</h3>
<div class="price">$1299</div>
<button onclick="add('iPhone 17 Pro Max',1299)">Add</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/51QPBmoc8FL.jpg">
<h3>MacBook A18 Pro</h3>
<div class="price">$1299</div>
<button onclick="add('MacBook A18 Pro',1299)">Add</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/61RGZdmKzRL.jpg">
<h3>Apple Watch Ultra 4</h3>
<div class="price">$799</div>
<button onclick="add('Apple Watch Ultra 4',799)">Add</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/51C8kxOdz-L.jpg">
<h3>iMac Pro 2026</h3>
<div class="price">$1799</div>
<button onclick="add('iMac Pro 2026',1799)">Add</button>
</div>

</div>

<div class="cart">

🛒 <span id="cartText">Cart</span> (<span id="count">0</span>)<br>

<div class="cart-items" id="cartItems"></div>

<span id="totalText">Total</span>: $<span id="total">0</span>

<button class="pay" onclick="openPay()">Checkout</button>
<button class="clear" onclick="clearCart()">Clear</button>

</div>

<!-- PAYMENT -->
<div id="payBox">
<div class="payInner">

<h3 id="payTitle">Payment</h3>

<div id="payInfo"></div>

<input placeholder="Card Number" style="width:100%;padding:8px;margin:5px 0;">
<input placeholder="CVV2" style="width:100%;padding:8px;margin:5px 0;">
<input placeholder="OTP" style="width:100%;padding:8px;margin:5px 0;">

<button onclick="doPay()" style="width:100%;padding:10px;background:green;color:white;border:none;border-radius:8px;">
Pay
</button>

<button onclick="closePay()" style="width:100%;padding:10px;margin-top:5px;">
Close
</button>

<div id="success" style="display:none;color:green;margin-top:10px;">
✅ Success (Demo)
</div>

</div>
</div>

<script>

let cart=[];
let lang="en";

/* ADD */
function add(name,price){
cart.push({name,price});
update();
}

/* UPDATE */
function update(){

document.getElementById("count").innerText=cart.length;

let t=0;
cart.forEach(i=>t+=i.price);
document.getElementById("total").innerText=t;

let html="";
cart.forEach((i,index)=>{
html+=`
<div class="item">
<span>${i.name}</span>
<span>$${i.price}</span>
<button onclick="removeItem(${index})">x</button>
</div>`;
});

document.getElementById("cartItems").innerHTML=html;
}

/* REMOVE ITEM */
function removeItem(i){
cart.splice(i,1);
update();
}

/* CLEAR */
function clearCart(){
cart=[];
update();
}

/* OPEN PAY */
function openPay(){
if(cart.length===0){
alert(lang==="en"?"Cart empty":"سبد خرید خالی است");
return;
}

let total=0;
cart.forEach(i=>total+=i.price);

document.getElementById("payInfo").innerText="Total: $"+total;
document.getElementById("payBox").style.display="block";
}

/* CLOSE */
function closePay(){
document.getElementById("payBox").style.display="none";
document.getElementById("success").style.display="none";
}

/* PAY */
function doPay(){
document.getElementById("success").style.display="block";

setTimeout(()=>{
cart=[];
update();
closePay();
},1500);
}

/* SEARCH */
function searchProducts(){
let input=document.getElementById("search").value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(input)?"block":"none";
});
}

/* LANGUAGE */
function toggleLang(){

if(lang==="en"){
lang="fa";

document.getElementById("logo").innerText="🛍 فروشگاه حرفه‌ای";
document.getElementById("search").placeholder="جستجو...";
document.getElementById("cartText").innerText="سبد";
document.getElementById("totalText").innerText="جمع";
document.getElementById("payTitle").innerText="پرداخت";

}else{
lang="en";

document.getElementById("logo").innerText="🛍 AR Store Pro";
document.getElementById("search").placeholder="Search...";
document.getElementById("cartText").innerText="Cart";
document.getElementById("totalText").innerText="Total";
document.getElementById("payTitle").innerText="Payment";
}
}

</script>

</body>
</html>
