<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فروشگاه آریان روی</title>

<style>
body{
margin:0;
font-family:Tahoma,sans-serif;
background:#f4f4f4;
}

.topbar{
background:#111;
padding:10px 15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.lang-btn{
background:white;
color:black;
padding:8px 15px;
border-radius:6px;
text-decoration:none;
font-weight:bold;
}

.logo-animate{
width:260px;
max-width:90%;
animation:fastPulse 0.35s infinite;
}

@keyframes fastPulse{
0%{transform:scale(1);}
20%{transform:scale(1.15);}
40%{transform:scale(0.92);}
60%{transform:scale(1.12);}
80%{transform:scale(0.97);}
100%{transform:scale(1);}
}

.slider{
position:relative;
height:420px;
overflow:hidden;
background:#fff;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:1s;
}

.slide.active{
opacity:1;
}

.slide img{
width:100%;
height:100%;
object-fit:contain;
background:#fff;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:30px;
}

.card{
background:white;
width:280px;
border-radius:15px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,.1);
text-decoration:none;
color:black;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:220px;
object-fit:contain;
background:white;
}

.card h3{
text-align:center;
padding:10px;
margin:0;
}

.view-btn{
display:block;
margin:15px auto;
padding:10px 18px;
background:black;
color:white;
border:none;
border-radius:8px;
text-align:center;
width:140px;
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
}
</style>
</head>

<body>

<div class="topbar">

<a href="en.html" class="lang-btn">
🇬🇧 English
</a>

<a href="https://t.me/iphonearian" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" width="40">
</a>

</div>

<div style="background:#111;text-align:center;padding:15px;">
<img src="file_00000000bfec720a9ea8aa8800b40ffb.png" class="logo-animate">
</div>

<div class="slider">

<div class="slide active">
<img src="https://m.media-amazon.com/images/I/41KOxRsuiiL._AC_UF894,1000_QL80_FMwebp_.jpg">
</div>

<div class="slide">
<img src="https://m.media-amazon.com/images/I/41iXTWoQ68L._AC_UF1000,1000_QL80_FMwebp_.jpg">
</div>

<div class="slide">
<img src="https://m.media-amazon.com/images/I/51LHWvW-i7L._AC_UF1000,1000_QL80_FMwebp_.jpg">
</div>

<div class="slide">
<img src="https://m.media-amazon.com/images/I/51gHT3oOpPL._AC_UF894,1000_QL80_FMwebp_.jpg">
</div>

</div>

<section class="products">

<a href="iphone.html" class="card">
<img src="https://m.media-amazon.com/images/I/51k0qRQFcuL._AC_UF894,1000_QL80_.jpg">
<h3>iPhone 17 Pro Max</h3>
<div class="view-btn">View Products</div>
</a>

<a href="macbook.html" class="card">
<img src="https://m.media-amazon.com/images/I/51QPBmoc8FL._AC_UF894,1000_QL80_FMwebp_.jpg">
<h3>MacBook A18 Pro</h3>
<div class="view-btn">View Products</div>
</a>

<a href="watch.html" class="card">
<img src="https://m.media-amazon.com/images/I/61RGZdmKzRL._AC_UF1000,1000_QL80_FMwebp_.jpg">
<h3>Apple Watch Ultra 4</h3>
<div class="view-btn">View Products</div>
</a>

<a href="imac.html" class="card">
<img src="https://m.media-amazon.com/images/I/51C8kxOdz-L._AC_UF1000,1000_QL80_FMwebp_.jpg">
<h3>iMac Pro 2026</h3>
<div class="view-btn">View Products</div>
</a>

</section>

<footer>
© فروشگاه آریان روی
</footer>

<script>
let slides=document.querySelectorAll('.slide');
let current=0;

setInterval(function(){

slides[current].classList.remove('active');

current++;

if(current>=slides.length){
current=0;
}

slides[current].classList.add('active');

},3000);
</script>

</body>
</html>
