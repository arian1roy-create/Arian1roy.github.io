<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Store</title>

<style>
body{
margin:0;
font-family:tahoma;
background:#f5f5f5;
}

.header{
position:sticky;
top:0;
background:#fff;
display:flex;
align-items:center;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #ddd;
}

.logo{
font-size:18px;
font-weight:bold;
color:#e60012;
}

.search{
flex:1;
margin:0 10px;
padding:8px;
border:1px solid #ddd;
border-radius:8px;
}

.lang{
background:#111;
color:#fff;
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#fff;
border-radius:12px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
height:130px;
object-fit:contain;
}

.price{
color:#e60012;
font-weight:bold;
}

.card button{
background:#e60012;
color:#fff;
border:none;
padding:6px;
border-radius:8px;
width:100%;
cursor:pointer;
}

.cart{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
color:#fff;
padding:10px;
}

.pay,.clear{
width:100%;
padding:10px;
border:none;
border-radius:8px;
color:white;
margin-top:5px;
cursor:pointer;
}

.pay{background:#25D366}
.clear{background:#444}
</style>
</head>

<body>

<div class="header">

<div class="logo" id="logo">🛍 AR Store</div>

<input id="search" class="search" placeholder="Search..." onkeyup="searchProducts()">

<button class="lang" onclick="toggleLang()">🌐</button>

</div>

<div class="products">

<div class="card">
<img src="https://m.media-amazon.com/images/I/51k0qRQFcuL.jpg">
<h3>iPhone 17 Pro Max</h3>
<div class="price">$1299</div>
<button onclick="add('iPhone 17 Pro Max',1299)">Add</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/51QPBmoc8FL.jpg">
<h3>MacBook A18 Pro</h3>
<div class="price">$1299</div>
<button onclick="add('MacBook A18 Pro',1299)">Add</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/61RGZdmKzRL.jpg">
<h3>Apple Watch Ultra 4</h3>
<div class="price">$799</div>
<button onclick="add('Apple Watch Ultra 4',799)">Add</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/51C8kxOdz-L.jpg">
<h3>iMac Pro 2026</h3>
<div class="price">$1799</div>
<button onclick="add('iMac Pro 2026',1799)">Add</button>
</div>

</div>

<div class="cart">

🛒 <span id="cartText">Cart</span> (<span id="count">0</span>)<br>

<span id="totalText">Total</span>: $<span id="total">0</span>

<button class="pay" id="payBtn" onclick="checkout()">Checkout Telegram</button>
<button class="clear" id="clearBtn" onclick="clearCart()">Clear Cart</button>

</div>

<script>

let cart=[];
let lang="en";

function add(name,price){
cart.push({name,price});
update();
}

function update(){
document.getElementById("count").innerText=cart.length;

let total=0;
cart.forEach(i=>total+=i.price);
document.getElementById("total").innerText=total;
}

function clearCart(){
cart=[];
update();
}

/* ✅ FIXED CHECKOUT (TELEGRAM WORKING 100%) */
function checkout(){

if(cart.length===0){
alert(lang==="en"?"Cart is empty!":"سبد خرید خالی است!");
return;
}

let text="🛒 "+(lang==="en"?"Order":"سفارش")+"\n\n";
let total=0;

cart.forEach(i=>{
text+="• "+i.name+" - $"+i.price+"\n";
total+=i.price;
});

text+="\n💰 "+(lang==="en"?"Total":"جمع کل")+": $"+total;

/* ✔ guaranteed open */
const url = "https://t.me/iphonearian?text=" + encodeURIComponent(text);
window.location.href = url;
}

/* SEARCH */
function searchProducts(){
let input=document.getElementById("search").value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(input)?"block":"none";
});
}

/* LANGUAGE FIXED */
function toggleLang(){

if(lang==="en"){
lang="fa";
document.getElementById("logo").innerText="🛍 فروشگاه AR";
document.getElementById("search").placeholder="جستجو...";
document.getElementById("payBtn").innerText="پرداخت";
document.getElementById("clearBtn").innerText="پاک کردن";
document.getElementById("cartText").innerText="سبد";
document.getElementById("totalText").innerText="جمع";
}else{
lang="en";
document.getElementById("logo").innerText="🛍 AR Store";
document.getElementById("search").placeholder="Search...";
document.getElementById("payBtn").innerText="Checkout Telegram";
document.getElementById("clearBtn").innerText="Clear Cart";
document.getElementById("cartText").innerText="Cart";
document.getElementById("totalText").innerText="Total";
}
}

</script>

</body>
</html>
