<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AR Store</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body{
margin:0;
font-family:tahoma;
background:#f5f5f5;
}

/* HEADER */
.header{
position:sticky;
top:0;
background:#fff;
display:flex;
align-items:center;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #ddd;
z-index:10;
}

.logo{
display:flex;
align-items:center;
gap:8px;
font-weight:bold;
color:#e60012;
}

.logo img{
width:28px;
height:28px;
}

.search{
flex:1;
margin:0 10px;
padding:8px;
border:1px solid #ddd;
border-radius:8px;
}

.lang-btn{
background:#111;
color:#fff;
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#fff;
border-radius:12px;
padding:10px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:130px;
object-fit:contain;
}

.card h3{
font-size:13px;
margin:8px 0;
}

.price{
color:#e60012;
font-weight:bold;
margin-bottom:5px;
}

.card button{
background:#e60012;
color:#fff;
border:none;
padding:6px;
border-radius:8px;
width:100%;
cursor:pointer;
}

/* CART */
.cart{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
color:#fff;
padding:10px;
border-top-left-radius:15px;
border-top-right-radius:15px;
z-index:20;
}

.cart button{
width:100%;
margin-top:6px;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

.pay{background:#25D366}
.clear{background:#444}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

<div class="logo">
<img src="icon.png">
<span id="title">AR Store</span>
</div>

<input id="search" class="search" placeholder="Search..." onkeyup="searchProducts()">

<button class="lang-btn" onclick="toggleLang()">🌐</button>

</div>

<!-- PRODUCTS -->
<div class="products">

<div class="card">
<img src="https://m.media-amazon.com/images/I/51k0qRQFcuL.jpg">
<h3>iPhone 17 Pro Max</h3>
<div class="price">$1299</div>
<button onclick="add('iPhone 17 Pro Max',1299)">Add</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/51QPBmoc8FL.jpg">
<h3>MacBook A18 Pro</h3>
<div class="price">$1299</div>
<button onclick="add('MacBook A18 Pro',1299)">Add</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/61RGZdmKzRL.jpg">
<h3>Apple Watch Ultra 4</h3>
<div class="price">$799</div>
<button onclick="add('Apple Watch Ultra 4',799)">Add</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/51C8kxOdz-L.jpg">
<h3>iMac Pro 2026</h3>
<div class="price">$1799</div>
<button onclick="add('iMac Pro 2026',1799)">Add</button>
</div>

</div>

<!-- CART -->
<div class="cart">
🛒 Cart (<span id="count">0</span>)
<div>Total: $<span id="total">0</span></div>

<button class="pay" onclick="checkout()">Checkout Telegram</button>
<button class="clear" onclick="clearCart()">Clear Cart</button>
</div>

<script>
let cart=[];
let lang="en";

/* ADD */
function add(name,price){
cart.push({name,price});
update();
}

/* UPDATE */
function update(){
document.getElementById("count").innerText=cart.length;
let t=0;
cart.forEach(i=>t+=i.price);
document.getElementById("total").innerText=t;
}

/* CLEAR */
function clearCart(){
cart=[];
update();
}

/* CHECKOUT */
function checkout(){
if(cart.length===0){
alert("Cart is empty!");
return;
}

let msg="🛒 New Order%0A%0A";
let total=0;

cart.forEach(i=>{
msg+="• "+i.name+" - $"+i.price+"%0A";
total+=i.price;
});

msg+="%0A💰 Total: $"+total;

window.open("https://t.me/iphonearian?text="+msg,"_blank");
}

/* SEARCH */
function searchProducts(){
let input=document.getElementById("search").value.toLowerCase();
let cards=document.querySelectorAll(".card");

cards.forEach(c=>{
let text=c.innerText.toLowerCase();
c.style.display = text.includes(input) ? "block" : "none";
});
}

/* LANGUAGE SWITCH */
function toggleLang(){
lang = (lang === "en") ? "fa" : "en";

if(lang === "fa"){
document.getElementById("title").innerText="فروشگاه";
document.getElementById("search").placeholder="جستجو...";
} else {
document.getElementById("title").innerText="AR Store";
document.getElementById("search").placeholder="Search...";
}
}
</script>

<!-- PWA -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/Arian1roy.github.io/sw.js');
}
</script>

</body>
</html>
