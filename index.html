<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arian Roy Store</title>

<style>
body{
    margin:0;
    font-family:Tahoma,Arial;
    background:#f4f4f4;
}

/* ===== TOP BAR ===== */
.top-bar{
    display:flex;
    justify-content:space-between;
    padding:10px 15px;
    background:#111;
    color:white;
    align-items:center;
}

.lang a{
    color:white;
    text-decoration:none;
    margin:0 5px;
}

/* ===== SLIDER ===== */
.slider{
    position:relative;
    width:100%;
    height:320px;
    overflow:hidden;
}

.slide{
    position:absolute;
    width:100%;
    height:100%;
    opacity:0;
    transition:opacity 1s ease-in-out;
    background-size:cover;
    background-position:center;
}

.slide.active{
    opacity:1;
}

.slide-text{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    text-align:center;
    text-shadow:0 2px 10px rgba(0,0,0,0.8);
}

/* ===== PRODUCTS ===== */
.products{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:30px;
}

.card{
    background:white;
    width:280px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,.15);
    overflow:hidden;
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card h3{
    padding:10px;
}

.card p{
    padding:0 10px 10px;
}

.price{
    color:green;
    font-weight:bold;
}

.btn{
    display:block;
    text-align:center;
    background:#007bff;
    color:white;
    padding:12px;
    text-decoration:none;
}

/* ===== FOOTER ===== */
footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
    <div>📩 Telegram</div>
    <div class="lang">
        <a href="#">🇮🇷 فارسی</a>
        <a href="#">🇬🇧 English</a>
    </div>
</div>

<!-- SLIDER -->
<div class="slider">

    <div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1510557880182-3d4d3cba35a5');">
        <div class="slide-text">
            <h2>iPhone Series | آیفون سری جدید</h2>
        </div>
    </div>

    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1517336714731-489689fd1ca8');">
        <div class="slide-text">
            <h2>MacBook Pro | مک‌بوک پرو</h2>
        </div>
    </div>

    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1606229365485-93a3b8ee0385');">
        <div class="slide-text">
            <h2>Apple Watch | اپل واچ</h2>
        </div>
    </div>

</div>

<!-- PRODUCTS -->
<section class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
<h3>Phone | گوشی</h3>
<p>Latest model</p>
<p class="price">Contact</p>
<a class="btn" href="#">View</a>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853">
<h3>Laptop | لپ‌تاپ</h3>
<p>High performance</p>
<p class="price">Contact</p>
<a class="btn" href="#">View</a>
</div>

</section>

<footer>
<p>© Arian Roy Store</p>
</footer>

<script>
let slides = document.querySelectorAll(".slide");
let i = 0;

setInterval(() => {
    slides[i].classList.remove("active");
    i = (i + 1) % slides.length;
    slides[i].classList.add("active");
}, 3000);
</script>

</body>
</html>
