<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فروشگاه آریان روی</title>

<style>
body{
margin:0;
font-family:Tahoma,sans-serif;
background:#f4f4f4;
}

/* TOPBAR */
.topbar{
background:#111;
padding:10px 15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.lang-btn{
background:white;
color:black;
padding:8px 15px;
border-radius:6px;
text-decoration:none;
font-weight:bold;
}

/* LOGO */
.logo-animate{
width:260px;
max-width:90%;
animation:fastPulse 0.35s infinite;
transform-origin:center;
}

@keyframes fastPulse{
0%{transform:scale(1);}
20%{transform:scale(1.15);}
40%{transform:scale(0.92);}
60%{transform:scale(1.12);}
80%{transform:scale(0.97);}
100%{transform:scale(1);}
}

/* SLIDER */
.slider{
position:relative;
height:420px;
overflow:hidden;
background:#fff;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:1s;
}

.slide.active{opacity:1;}

.slide img{
width:100%;
height:100%;
object-fit:contain;
}

/* PRODUCTS */
.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:30px;
}

.card{
background:white;
width:280px;
border-radius:15px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:220px;
object-fit:contain;
}

.card h3{
text-align:center;
margin:10px 0;
}

.buy-btn{
display:block;
margin:10px auto 15px;
padding:10px 18px;
background:black;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

/* CART BAR */
#cartBar{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
color:white;
border-top:2px solid #333;
z-index:999;
}

#cartHeader{
padding:12px;
cursor:pointer;
display:flex;
justify-content:space-between;
font-weight:bold;
}

#cartBody{
display:none;
padding:10px;
background:#1a1a1a;
}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
margin:5px 0;
font-size:13px;
}

.qty-btn{
background:#333;
color:white;
border:none;
padding:3px 8px;
margin:0 3px;
cursor:pointer;
border-radius:5px;
}

.remove-btn{
background:red;
color:white;
border:none;
padding:3px 6px;
border-radius:5px;
cursor:pointer;
}

#cartBar button{
width:100%;
padding:10px;
background:#25D366;
color:white;
border:none;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
<a href="en.html" class="lang-btn">🇬🇧 English</a>
<a href="https://t.me/iphonearian" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" width="40">
</a>
</div>

<!-- LOGO -->
<div style="background:#111;text-align:center;padding:15px;">
<img src="file_00000000bfec720a9ea8aa8800b40ffb.png" class="logo-animate">
</div>

<!-- SLIDER -->
<div class="slider">

<div class="slide active">
<img src="https://m.media-amazon.com/images/I/41KOxRsuiiL._AC_UF894,1000_QL80_FMwebp_.jpg">
</div>

<div class="slide">
<img src="https://m.media-amazon.com/images/I/41iXTWoQ68L._AC_UF1000,1000_QL80_FMwebp_.jpg">
</div>

<div class="slide">
<img src="https://m.media-amazon.com/images/I/51LHWvW-i7L._AC_UF1000,1000_QL80_FMwebp_.jpg">
</div>

<div class="slide">
<img src="https://m.media-amazon.com/images/I/51gHT3oOpPL._AC_UF894,1000_QL80_FMwebp_.jpg">
</div>

</div>

<!-- PRODUCTS (۴ تا کامل خودت حفظ شد) -->
<section class="products">

<div class="card">
<img src="https://m.media-amazon.com/images/I/51k0qRQFcuL._AC_UF894,1000_QL80_.jpg">
<h3>iPhone 17 Pro Max</h3>
<button class="buy-btn" onclick="addToCart('iPhone 17 Pro Max',1299)">BUY</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/51QPBmoc8FL._AC_UF894,1000_QL80_FMwebp_.jpg">
<h3>MacBook A18 Pro</h3>
<button class="buy-btn" onclick="addToCart('MacBook A18 Pro',999)">BUY</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/61RGZdmKzRL._AC_UF1000,1000_QL80_FMwebp_.jpg">
<h3>Apple Watch Ultra 4</h3>
<button class="buy-btn" onclick="addToCart('Apple Watch Ultra 4',699)">BUY</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/51C8kxOdz-L._AC_UF1000,1000_QL80_FMwebp_.jpg">
<h3>iMac Pro 2026</h3>
<button class="buy-btn" onclick="addToCart('iMac Pro 2026',1499)">BUY</button>
</div>

</section>

<!-- CART -->
<div id="cartBar">

<div id="cartHeader" onclick="toggleCart()">
🛒 Cart (<span id="count">0</span>)
<span id="arrow">▲</span>
</div>

<div id="cartBody">
<div id="cartItems"></div>

<p>Total: $<span id="total">0</span></p>

<button onclick="checkout()">Checkout Telegram</button>
</div>
</div>

<script>
let cart=[];

function addToCart(name,price){
let item=cart.find(i=>i.name===name);

if(item){
item.qty++;
}else{
cart.push({name,price,qty:1});
}

update();
}

function update(){
document.getElementById("count").innerText=cart.length;

let box=document.getElementById("cartItems");
box.innerHTML="";

let total=0;

cart.forEach((i,index)=>{
total+=i.price*i.qty;

box.innerHTML+=`
<div class="cart-item">
<span>${i.name} ($${i.price})</span>

<div>
<button class="qty-btn" onclick="changeQty(${index},-1)">-</button>
${i.qty}
<button class="qty-btn" onclick="changeQty(${index},1)">+</button>
<button class="remove-btn" onclick="removeItem(${index})">x</button>
</div>
</div>
`;
});

document.getElementById("total").innerText=total;
}

function changeQty(i,v){
cart[i].qty+=v;
if(cart[i].qty<=0) cart.splice(i,1);
update();
}

function removeItem(i){
cart.splice(i,1);
update();
}

function toggleCart(){
let body=document.getElementById("cartBody");
let arrow=document.getElementById("arrow");

if(body.style.display==="block"){
body.style.display="none";
arrow.innerHTML="▲";
}else{
body.style.display="block";
arrow.innerHTML="▼";
}
}

function checkout(){
if(cart.length===0){
alert("Cart is empty!");
return;
}

let msg="🛒 New Order:%0A";
let total=0;

cart.forEach(i=>{
msg+=`${i.name} x${i.qty} - $${i.price*i.qty}%0A`;
total+=i.price*i.qty;
});

msg+=`%0A💰 Total: $${total}`;

window.open("https://t.me/iphonearian?text="+msg,"_blank");
}
</script>

</body>
</html>
