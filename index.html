<!DOCTYPE html>  <html lang="en" dir="rtl">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>AR Store</title>  

<!-- 👇 فقط این خط جدید رو اضافه کن -->
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<style> 
html,body{overflow-x:hidden;margin:0;font-family:tahoma;background:#000;}  
*{box-sizing:border-box;}  
  
.header{  
position:sticky;top:0;background:#000;  
padding:10px;display:flex;justify-content:space-between;  
align-items:center;border-bottom:1px solid #333;  
z-index:10;  
}  
.category,.card{
background:#1a1a1a;
color:#ffd700;
border-radius:12px;
box-shadow:0 2px 8px rgba(255,255,255,0.05);
padding:10px;
}
.card h3{
color:#fff;
margin:8px 0 0;
}

.price{
color:yellow;
font-weight:bold;
}
.card h3,
.card p{
color:#fff;
}
.card{
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}
.langBtn,.back{  
background:#111;color:#fff;border:none;  
padding:6px 10px;border-radius:8px;cursor:pointer;  
}  
.headerLogo{
height:55px;
width:auto;
display:block;
}  
.storeGlow{
font-size:32px;
font-weight:bold;
margin-left:10px;
animation: neonGlow 1.8s infinite alternate;
}

@keyframes neonGlow{
0%{
color:#fff;
text-shadow:
0 0 5px #fff,
0 0 10px #ffd700,
0 0 20px #ffd700,
0 0 40px #ffea00;
transform:translateY(0);
opacity:0.9;
}

50%{
color:#ffd700;
text-shadow:
0 0 10px #ffd700,
0 0 20px #ffd700,
0 0 40px #ffd700,
0 0 60px #ffea00;
transform:translateY(-2px);
opacity:1;
}

100%{
color:#fff;
text-shadow:
0 0 5px #fff,
0 0 15px #ffd700,
0 0 25px #ffd700,
0 0 45px #ffea00;
transform:translateY(0);
opacity:0.95;
}
}
.container{padding:10px;padding-bottom:170px;}  
  
.grid{  
display:grid;  
grid-template-columns:repeat(2,1fr);  
gap:10px;  
}  
  
.card img{  
width:100%;height:90px;object-fit:contain;  
}   
  
button{  
background:#e60012;color:#fff;border:none;  
padding:6px;border-radius:8px;width:100%;  
margin-top:5px;cursor:pointer;  
}  
  
.cartBar{  
position:fixed;bottom:0;left:0;right:0;  
background:#111;color:#fff;padding:10px;  
}  
  
.payBtn{background:#25D366;}  
.clearBtn{background:#444;}  
  
#payBox{  
display:none;  
position:fixed;  
inset:0;  
background:rgba(0,0,0,.5);  
justify-content:center;  
align-items:center;  
z-index:999;  
}  
  
.payInner{  
background:#fff;width:90%;max-width:320px;  
border-radius:12px;padding:15px;text-align:center;  
}  
  
/* SLIDER */  
.slider{  
width:100%;  
height:160px;  
overflow:hidden;  
border-radius:15px;  
margin-bottom:15px;  
}  
  
.slider img{  
width:100%;  
height:160px;  
object-fit:cover;  
transition:opacity 0.5s ease;  
}  
</style>  </head>  <body>  <div class="header">

<img src="arian-roy.png" class="headerLogo">
<div class="storeGlow">STORE</div>
<button class="langBtn" onclick="toggleLang()">🌐</button>
</div>  <div class="container" id="app"></div>  <div class="cartBar">  
🛒 <span id="count">0</span><br>  
Total: $<span id="total">0</span>  <button class="payBtn" onclick="openPay()">  
Checkout  
</button>  <button class="clearBtn" onclick="clearCart()">Clear</button>

</div>  <div id="payBox">  
<div class="payInner">  
<div style="font-size:40px">💳</div>  
<div style="font-weight:bold;margin-bottom:10px;">Telegram Payment</div>  
<button class="payBtn" onclick="goTelegram()">Pay via Telegram</button>  
<button class="payBtn" onclick="fakePay()">Pay Now</button>  
<button class="clearBtn" onclick="closePay()">Close</button>  
</div>  
</div>  <script>  
  
let cart=[];  
let lang="en";  
  
let data = {
  cars: Array.from({length:20},(_,i)=>({
    name:"Car "+(i+1),
    price:50000+i*1500
  })),

  phones:[
    {
      name:"iPhone 17 Pro 256GB Cosmic Orange",
      storage:"256GB",
      color:"Cosmic Orange",
      register:"Non PTA",
      desc:"Brand new box pack",
      price:999,
      img:"https://images.unsplash.com/photo-1695048133142-1a20484d2569?auto=format&fit=crop&w=800&q=80"
    },
    {
      name:"iPhone 16 Pro Max",
      storage:"256GB",
      color:"Titanium Black",
      register:"Non PTA",
      desc:"Brand new box pack",
      price:1099,
      img:"https://images.unsplash.com/photo-1592899677977-9c10ca588bbd?auto=format&fit=crop&w=800&q=80"
    },

    ...Array.from({length:18},(_,i)=>({
      name:"Phone "+(i+3),
      price:840+i*40,
      img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"
    }))
  ],

  laptops: Array.from({length:20},(_,i)=>({
    name:"Laptop "+(i+1),
    price:1200+i*80
  })),

  imac: Array.from({length:20},(_,i)=>({
    name:"iMac "+(i+1),
    price:1500+i*100
  })),

  beds: Array.from({length:20},(_,i)=>({
    name:"Bed "+(i+1),
    price:300+i*30
  })),

  tablets: Array.from({length:20},(_,i)=>({
    name:"Tablet "+(i+1),
    price:900+i*50
  })),

  watches: Array.from({length:20},(_,i)=>({
    name:"Watch "+(i+1),
    price:200+i*20
  })),

  headphones: Array.from({length:20},(_,i)=>({
    name:"Headphone "+(i+1),
    price:150+i*10
  })),

  tv: Array.from({length:20},(_,i)=>({
    name:"TV "+(i+1),
    price:1000+i*100
  })),

  shoes: Array.from({length:20},(_,i)=>({
    name:"Shoes "+(i+1),
    price:120+i*15
  }))
};
  
let t={  
en:{
cars:"Cars",
phones:"Phones",
laptops:"Laptops",
imac:"iMac",
beds:"Beds",
tablets:"Tablets",
watches:"Watches",
headphones:"Headphones",
tv:"TV",
shoes:"Shoes",
add:"Add",

// 👇 اضافه شد برای توضیحات موبایل
phoneName:"Phone Name:",
storage:"Storage:",
color:"Color:",
register:"Register:",
desc:"Description:",
price:"Price:"
},  

fa:{
cars:"ماشین",
phones:"موبایل",
laptops:"لپ‌تاپ",
imac:"آی‌مک",
beds:"تخت",
tablets:"تبلت",
watches:"ساعت",
headphones:"هدفون",
tv:"تلویزیون",
shoes:"کفش",
add:"افزودن",

// 👇 اضافه شد برای توضیحات موبایل
phoneName:"اسم گوشی:",
storage:"حافظه داخلی:",
color:"رنگ:",
register:"ریجیستر:",
desc:"توضیحات:",
price:"قیمت:"
}  
};
  
let slides=[  
"arian-company.png",  
"arian-company2.png",  
"arian-company3.png"  
];  
  
let s=0;  
  
function renderHome(){  
  
document.getElementById("app").innerHTML=`  
  
<div class="slider">  
<img id="slideImg" src="${slides[0]}">  
</div>  
<input
type="text"
id="searchBox"
placeholder="🔍 Search products..."
onkeyup="searchProducts()"
style="
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:15px;
"> 
<div class="grid">
  <div class="category" onclick="openCat('cars')">${t[lang].cars}</div>
  <div class="category" onclick="openCat('phones')">${t[lang].phones}</div>
  <div class="category" onclick="openCat('laptops')">${t[lang].laptops}</div>
  <div class="category" onclick="openCat('imac')">${t[lang].imac}</div>
  <div class="category" onclick="openCat('beds')">${t[lang].beds}</div>

  <div class="category" onclick="openCat('tablets')">${t[lang].tablets}</div>
  <div class="category" onclick="openCat('watches')">${t[lang].watches}</div>
  <div class="category" onclick="openCat('headphones')">${t[lang].headphones}</div>
  <div class="category" onclick="openCat('tv')">${t[lang].tv}</div>
  <div class="category" onclick="openCat('shoes')">${t[lang].shoes}</div>
</div>
  
`;  
}  
  
setInterval(()=>{  
let el=document.getElementById("slideImg");  
if(!el) return;  
  
s=(s+1)%slides.length;  
el.style.opacity="0";  
  
setTimeout(()=>{  
el.src=slides[s];  
el.style.opacity="1";  
},300);  
  
},3000);  
  
function openCat(cat){

  console.log("CAT:", cat);

  let html = `<div class="grid">`;

  if(!data[cat]){
    document.getElementById("app").innerHTML =
      "<p style='color:white'>Category not found</p>";
    return;
  }

  data[cat].forEach((p)=>{

    let img = p && p.img ? p.img : FALLBACK_IMG;

    let title = lang === "fa"
      ? "محصول: " + p.name
      : "Product: " + p.name;

    let price = p.price || 0;

    html += `
      <div class="card">

        <img src="${img}"
          onerror="this.onerror=null;this.src='${FALLBACK_IMG}'">

        <h3>${title}</h3>

        <div class="price">$${price}</div>

        <button onclick="add('${p.name}',${price})">
          ${t[lang].add}
        </button>

      </div>
    `;
  });

  html += `</div>`;
  document.getElementById("app").innerHTML = html;
}
function add(n,p){  
cart.push({n,p});  
update();  
}  
  
function update(){  
document.getElementById("count").innerText=cart.length;  
let total=0;  
cart.forEach(i=>total+=i.p);  
document.getElementById("total").innerText=total;  
}  
  
function clearCart(){  
cart=[];  
update();  
}  
  
function openPay(){

if(!cart.length){
alert("Cart empty");
return;
}

let total=0;
cart.forEach(i=>total+=i.p);

fetch("https://ar-store-backend.onrender.com/pay", {
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({amount:total})
})
.then(r=>r.json())
.then(data=>{

alert(
"✅ Order Created\n\n" +
"Order ID: " + data.orderId +
"\n\nWallet:\n" + data.wallet +
"\n\nAmount: $" + data.amount
);

})
.catch(err=>{
alert("Server error");
console.log(err);
});

}
function closePay(){  
document.getElementById("payBox").style.display="none";  
}  
  
function fakePay(){  
alert("Success");  
}  
  
function goTelegram(){  
let txt="Order:\n";  
let total=0;  
cart.forEach(i=>{  
txt+=i.n+" - $"+i.p+"\n";  
total+=i.p;  
});  
txt+="\nTotal:"+total;  
window.location.href="https://t.me/iphonearian?text="+encodeURIComponent(txt);  
}  
  
function toggleLang(){  
lang=(lang==="en")?"fa":"en";  
renderHome();  
}  
  
renderHome();  
  
</script>  </body>  
</html>
