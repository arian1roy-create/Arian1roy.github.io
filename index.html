<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فروشگاه آریان روی</title>

<style>
body{
margin:0;
font-family:Tahoma;
background:#f4f4f4;
}

/* TOP */
.topbar{
background:#111;
padding:10px 15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.lang-btn{
background:white;
color:black;
padding:8px 15px;
border-radius:6px;
text-decoration:none;
font-weight:bold;
}

/* LOGO */
.logo-animate{
width:260px;
animation:fastPulse 0.35s infinite;
}

@keyframes fastPulse{
0%{transform:scale(1);}
20%{transform:scale(1.15);}
40%{transform:scale(0.92);}
60%{transform:scale(1.12);}
80%{transform:scale(0.97);}
100%{transform:scale(1);}
}

/* SLIDER */
.slider{
position:relative;
height:420px;
overflow:hidden;
background:#fff;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:1s;
}

.slide.active{opacity:1;}

.slide img{
width:100%;
height:100%;
object-fit:contain;
}

/* PRODUCTS */
.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:30px;
}

.card{
background:white;
width:280px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
overflow:hidden;
}

.card img{
width:100%;
height:220px;
object-fit:contain;
}

.card h3{
text-align:center;
margin:10px 0;
}

.buy-btn{
display:block;
margin:10px auto;
padding:10px 18px;
background:black;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

/* OPTIONS BOX */
.options{
display:none;
padding:10px;
text-align:center;
background:#f9f9f9;
}

.option-btn{
display:block;
width:90%;
margin:5px auto;
padding:8px;
background:#222;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

/* CART */
#cartBar{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
color:white;
border-top:2px solid #333;
}

#cartHeader{
padding:12px;
display:flex;
justify-content:space-between;
cursor:pointer;
font-weight:bold;
}

#cartBody{
display:none;
padding:10px;
background:#1a1a1a;
}

.cart-item{
display:flex;
justify-content:space-between;
font-size:13px;
margin:5px 0;
}

.qty-btn{
background:#333;
color:white;
border:none;
padding:3px 8px;
border-radius:5px;
cursor:pointer;
}

.remove-btn{
background:red;
color:white;
border:none;
padding:3px 6px;
border-radius:5px;
cursor:pointer;
}

#cartBar button{
width:100%;
padding:10px;
background:#25D366;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
<a href="en.html" class="lang-btn">🇬🇧 English</a>
</div>

<!-- LOGO -->
<div style="background:#111;text-align:center;padding:15px;">
<img src="file_00000000bfec720a9ea8aa8800b40ffb.png" class="logo-animate">
</div>

<!-- SLIDER -->
<div class="slider">
<div class="slide active"><img src="https://m.media-amazon.com/images/I/41KOxRsuiiL.jpg"></div>
<div class="slide"><img src="https://m.media-amazon.com/images/I/41iXTWoQ68L.jpg"></div>
<div class="slide"><img src="https://m.media-amazon.com/images/I/51LHWvW-i7L.jpg"></div>
<div class="slide"><img src="https://m.media-amazon.com/images/I/51gHT3oOpPL.jpg"></div>
</div>

<!-- PRODUCTS -->
<section class="products">

<!-- iPhone -->
<div class="card">
<img src="https://m.media-amazon.com/images/I/51k0qRQFcuL.jpg">
<h3>iPhone 17 Pro Max</h3>

<button class="buy-btn" onclick="toggle('iphone')">View Options</button>

<div id="iphone" class="options">
<button class="option-btn" onclick="addToCart('iPhone 256GB',1299)">256GB - $1299</button>
<button class="option-btn" onclick="addToCart('iPhone 512GB',1499)">512GB - $1499</button>
<button class="option-btn" onclick="addToCart('iPhone 1TB',1799)">1TB - $1799</button>
</div>
</div>

<!-- MacBook -->
<div class="card">
<img src="https://m.media-amazon.com/images/I/51QPBmoc8FL.jpg">
<h3>MacBook A18 Pro</h3>

<button class="buy-btn" onclick="toggle('mac')">View Options</button>

<div id="mac" class="options">
<button class="option-btn" onclick="addToCart('MacBook 512GB',999)">512GB - $999</button>
<button class="option-btn" onclick="addToCart('MacBook 1TB',1299)">1TB - $1299</button>
</div>
</div>

<!-- Watch -->
<div class="card">
<img src="https://m.media-amazon.com/images/I/61RGZdmKzRL.jpg">
<h3>Apple Watch Ultra 4</h3>

<button class="buy-btn" onclick="toggle('watch')">View Options</button>

<div id="watch" class="options">
<button class="option-btn" onclick="addToCart('Watch GPS',699)">GPS - $699</button>
<button class="option-btn" onclick="addToCart('Watch LTE',799)">LTE - $799</button>
</div>
</div>

<!-- iMac -->
<div class="card">
<img src="https://m.media-amazon.com/images/I/51C8kxOdz-L.jpg">
<h3>iMac Pro 2026</h3>

<button class="buy-btn" onclick="toggle('imac')">View Options</button>

<div id="imac" class="options">
<button class="option-btn" onclick="addToCart('iMac 27"',1499)">27" - $1499</button>
<button class="option-btn" onclick="addToCart('iMac 32"',1799)">32" - $1799</button>
</div>
</div>

</section>

<!-- CART -->
<div id="cartBar">
<div id="cartHeader" onclick="toggleCart()">
🛒 Cart (<span id="count">0</span>)
<span id="arrow">▲</span>
</div>

<div id="cartBody">
<div id="cartItems"></div>
<p>Total: $<span id="total">0</span></p>
<button onclick="checkout()">Checkout Telegram</button>
</div>
</div>

<script>
let cart=[];

function toggle(id){
let el=document.getElementById(id);
el.style.display = el.style.display==="block"?"none":"block";
}

function addToCart(name,price){
cart.push({name,price,qty:1});
update();
}

function update(){
document.getElementById("count").innerText=cart.length;

let box=document.getElementById("cartItems");
box.innerHTML="";

let total=0;

cart.forEach((i,index)=>{
total+=i.price;

box.innerHTML+=`
<div class="cart-item">
<span>${i.name}</span>
<div>
$${i.price}
<button class="remove-btn" onclick="removeItem(${index})">x</button>
</div>
</div>
`;
});

document.getElementById("total").innerText=total;
}

function removeItem(i){
cart.splice(i,1);
update();
}

function toggleCart(){
let body=document.getElementById("cartBody");
let arrow=document.getElementById("arrow");

body.style.display = body.style.display==="block"?"none":"block";
arrow.innerHTML = body.style.display==="block"?"▼":"▲";
}

function checkout(){
if(cart.length===0){
alert("Cart is empty!");
return;
}

let msg="🛒 Order:%0A";
let total=0;

cart.forEach(i=>{
msg+=i.name+" - $"+i.price+"%0A";
total+=i.price;
});

msg+="%0ATotal: $"+total;

window.open("https://t.me/iphonearian?text="+msg,"_blank");
}
</script>

</body>
</html>
