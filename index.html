<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Store</title>

<style>
html,body{overflow-x:hidden;margin:0;font-family:tahoma;background:#f5f5f5;}
*{box-sizing:border-box;}

.header{
position:sticky;top:0;background:#fff;
padding:10px;display:flex;justify-content:space-between;
align-items:center;border-bottom:1px solid #ddd;
z-index:10;
}

.langBtn,.back{
background:#111;color:#fff;border:none;
padding:6px 10px;border-radius:8px;cursor:pointer;
}

.container{padding:10px;padding-bottom:170px;}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.category,.card{
background:#fff;border-radius:12px;
padding:10px;text-align:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
width:100%;height:90px;object-fit:contain;
}

.price{color:#e60012;font-weight:bold;}

button{
background:#e60012;color:#fff;border:none;
padding:6px;border-radius:8px;width:100%;
margin-top:5px;cursor:pointer;
}

.cartBar{
position:fixed;bottom:0;left:0;right:0;
background:#111;color:#fff;padding:10px;
}

.payBtn{background:#25D366;}
.clearBtn{background:#444;}

.slider{
width:100%;
height:160px;
overflow:hidden;
border-radius:15px;
margin-bottom:15px;
}

.slider img{
width:100%;
height:160px;
object-fit:cover;
transition:opacity 0.5s ease;
}

</style>
</head>

<body>

<div class="header">
<button class="back">⬅</button>
<div>🛍 AR Store</div>
<button class="langBtn">🌐</button>
</div>

<div class="container" id="app"></div>

<div class="cartBar">
🛒 <span id="count">0</span><br>
Total: $<span id="total">0</span>

<button class="payBtn" onclick="openPay()">Checkout</button>
<button class="clearBtn" onclick="clearCart()">Clear</button>
</div>

<script>

let cart=[];

let data={
cars:Array.from({length:10},(_,i)=>({name:"Car "+(i+1),price:50000+i*1500})),
phones:Array.from({length:10},(_,i)=>({name:"Phone "+(i+1),price:800+i*40}))
};

let slides=[
"arian-company.png",
"arian-company2.png",
"arian-company3.png"
];

let s=0;

/* HOME */
function renderHome(){
document.getElementById("app").innerHTML=`
<div class="slider">
<img id="slideImg" src="${slides[0]}">
</div>

<div class="grid">
<div class="category" onclick="openCat('cars')">Cars</div>
<div class="category" onclick="openCat('phones')">Phones</div>
</div>
`;
}

setInterval(()=>{
let img=document.getElementById("slideImg");
if(!img) return;

s=(s+1)%slides.length;
img.style.opacity="0";

setTimeout(()=>{
img.src=slides[s];
img.style.opacity="1";
},300);

},3000);

/* CART */
function add(n,p){
cart.push({n,p});
update();
}

function update(){
document.getElementById("count").innerText=cart.length;
let total=0;
cart.forEach(i=>total+=i.p);
document.getElementById("total").innerText=total;
}

function clearCart(){
cart=[];
update();
}

/* ✅ FIXED CHECKOUT */
async function openPay(){
if(cart.length===0){
alert("Cart empty");
return;
}

let total=0;
cart.forEach(i=>total+=i.p);

try{
const res = await fetch("https://ar-store-backend.onrender.com/pay", {
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({amount:total})
});

const data = await res.json();

if(data && data.url){
window.open(data.url,"_blank");
}else{
alert("Payment failed");
}

}catch(e){
console.log(e);
alert("Server error. Try again later.");
}
}

/* CATEGORIES */
function openCat(cat){
let html=`<div class="grid">`;

data[cat].forEach(p=>{
html+=`
<div class="card">
<h3>${p.name}</h3>
<div class="price">$${p.price}</div>
<button onclick="add('${p.name}',${p.price})">Add</button>
</div>`;
});

html+="</div>";
document.getElementById("app").innerHTML=html;
}

renderHome();

</script>

</body>
</html>
