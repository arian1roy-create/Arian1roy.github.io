<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فروشگاه آریان روی</title>

<style>
body{
margin:0;
font-family:Tahoma,sans-serif;
background:#f4f4f4;
}

/* TOP */
.topbar{
background:#111;
padding:10px 15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.lang-btn{
background:white;
color:black;
padding:8px 15px;
border-radius:6px;
text-decoration:none;
font-weight:bold;
}

/* SLIDER */
.slider{
position:relative;
height:420px;
overflow:hidden;
background:#fff;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:1s;
}

.slide.active{opacity:1;}

.slide img{
width:100%;
height:100%;
object-fit:contain;
background:#fff;
}

.caption{
position:absolute;
bottom:20px;
left:0;
right:0;
text-align:center;
color:white;
font-size:28px;
font-weight:bold;
text-shadow:0 0 10px black;
}

/* PRODUCTS */
.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:30px;
}

.card{
background:white;
width:280px;
border-radius:15px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
text-decoration:none;
color:black;
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 12px 25px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:220px;
object-fit:contain;
}

.card h3{
text-align:center;
margin:10px 0;
}

.buy-btn{
display:block;
margin:10px auto 15px;
padding:10px 18px;
background:linear-gradient(45deg,#000,#333);
color:white;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

/* FOOTER */
footer{
background:#111;
color:white;
text-align:center;
padding:20px;
}

/* LOGO */
@keyframes fastPulse {
0%{transform:scale(1);}
20%{transform:scale(1.15);}
40%{transform:scale(0.92);}
60%{transform:scale(1.12);}
80%{transform:scale(0.97);}
100%{transform:scale(1);}
}

.logo-animate{
width:260px;
animation:fastPulse 0.35s infinite;
}

/* =========================
   CART (DIGIKALA STYLE)
========================= */

#cartBar{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
color:white;
z-index:999;
border-top:2px solid #333;
font-family:tahoma;
}

#cartHeader{
padding:12px;
cursor:pointer;
display:flex;
justify-content:space-between;
font-weight:bold;
}

#cartBody{
display:none;
padding:10px;
background:#1a1a1a;
}

#cartList{
max-height:120px;
overflow:auto;
font-size:13px;
margin-bottom:8px;
}

#cartBar button{
width:100%;
padding:10px;
background:#25D366;
color:white;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<div class="topbar">
<a href="en.html" class="lang-btn">🇬🇧 English</a>
<a href="https://t.me/iphonearian" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" width="40">
</a>
</div>

<!-- LOGO -->
<div style="background:#111;text-align:center;padding:15px;">
<img src="file_00000000bfec720a9ea8aa8800b40ffb.png" class="logo-animate">
</div>

<!-- SLIDER -->
<div class="slider">

<div class="slide active">
<img src="https://m.media-amazon.com/images/I/41KOxRsuiiL._AC_UF894,1000_QL80_FMwebp_.jpg">
<div class="caption">iPhone 17 Pro Max</div>
</div>

<div class="slide">
<img src="https://m.media-amazon.com/images/I/41iXTWoQ68L._AC_UF1000,1000_QL80_FMwebp_.jpg">
<div class="caption">MacBook A18 Pro</div>
</div>

<div class="slide">
<img src="https://m.media-amazon.com/images/I/51LHWvW-i7L._AC_UF1000,1000_QL80_FMwebp_.jpg">
<div class="caption">Apple Watch Ultra 4</div>
</div>

<div class="slide">
<img src="https://m.media-amazon.com/images/I/51gHT3oOpPL._AC_UF894,1000_QL80_FMwebp_.jpg">
<div class="caption">iMac Pro 2026</div>
</div>

</div>

<!-- PRODUCTS -->
<section class="products">

<a class="card">
<img src="https://m.media-amazon.com/images/I/51k0qRQFcuL._AC_UF894,1000_QL80_.jpg">
<h3>iPhone 17 Pro Max</h3>
<button class="buy-btn" onclick="addToCart('iPhone 17 Pro Max',1299)">BUY</button>
</a>

<a class="card">
<img src="https://m.media-amazon.com/images/I/51QPBmoc8FL._AC_UF894,1000_QL80_FMwebp_.jpg">
<h3>MacBook A18 Pro</h3>
<button class="buy-btn" onclick="addToCart('MacBook A18 Pro',999)">BUY</button>
</a>

<a class="card">
<img src="https://m.media-amazon.com/images/I/61RGZdmKzRL._AC_UF1000,1000_QL80_FMwebp_.jpg">
<h3>Apple Watch Ultra 4</h3>
<button class="buy-btn" onclick="addToCart('Apple Watch Ultra 4',699)">BUY</button>
</a>

<a class="card">
<img src="https://m.media-amazon.com/images/I/51C8kxOdz-L._AC_UF1000,1000_QL80_FMwebp_.jpg">
<h3>iMac Pro 2026</h3>
<button class="buy-btn" onclick="addToCart('iMac Pro 2026',1499)">BUY</button>
</a>

</section>

<!-- CART BAR -->
<div id="cartBar">
<div id="cartHeader" onclick="toggleCart()">
🛒 Cart (<span id="cartCount">0</span>)
<span id="arrow">▲</span>
</div>

<div id="cartBody">
<div id="cartList">Empty</div>
<p>Total: $<span id="cartTotal">0</span></p>

<button onclick="checkoutTelegram()">Checkout Telegram</button>
</div>
</div>

<footer>
© فروشگاه آریان روی
</footer>

<script>
let cart=[];
let total=0;

function addToCart(name,price){
cart.push({name,price});
total+=price;
updateCart();
}

function updateCart(){
document.getElementById("cartCount").innerText=cart.length;

let box=document.getElementById("cartList");
box.innerHTML="";

if(cart.length===0){
box.innerHTML="Empty";
}

cart.forEach(i=>{
box.innerHTML+="• "+i.name+" - $"+i.price+"<br>";
});

document.getElementById("cartTotal").innerText=total;
}

function toggleCart(){
let body=document.getElementById("cartBody");
let arrow=document.getElementById("arrow");

if(body.style.display==="block"){
body.style.display="none";
arrow.innerHTML="▲";
}else{
body.style.display="block";
arrow.innerHTML="▼";
}
}

function checkoutTelegram(){
if(cart.length===0){
alert("Cart is empty!");
return;
}

let msg="🛒 New Order:%0A";

cart.forEach(i=>{
msg+=i.name+" - $"+i.price+"%0A";
});

msg+="%0A💰 Total: $"+total;

window.open("https://t.me/iphonearian?text="+msg,"_blank");
}
</script>

</body>
</html>
