<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Store</title>

<meta name="theme-color" content="#111">

<style>
body{
margin:0;
font-family:tahoma;
background:#f5f5f5;
}

/* HEADER */
.header{
position:sticky;
top:0;
background:#fff;
display:flex;
align-items:center;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #ddd;
}

.logo{
font-size:18px;
font-weight:bold;
color:#e60012;
}

.search{
flex:1;
margin:0 10px;
padding:8px;
border:1px solid #ddd;
border-radius:8px;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#fff;
border-radius:12px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
height:130px;
object-fit:contain;
}

.price{
color:#e60012;
font-weight:bold;
}

.card button{
background:#e60012;
color:#fff;
border:none;
padding:6px;
border-radius:8px;
width:100%;
}

/* CART */
.cart{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
color:#fff;
padding:10px;
}

.pay{
width:100%;
background:#25D366;
padding:10px;
border:none;
border-radius:8px;
color:white;
margin-top:5px;
}

.clear{
width:100%;
background:#444;
padding:10px;
border:none;
border-radius:8px;
color:white;
margin-top:5px;
}

/* PAYMENT MODAL */
#payBox{
display:none;
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.6);
z-index:999;
}

.payInner{
background:#fff;
max-width:380px;
margin:80px auto;
padding:20px;
border-radius:12px;
text-align:center;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">🛍 AR Store</div>
<input class="search" placeholder="Search..." onkeyup="searchProducts()">
</div>

<div class="products">

<div class="card">
<img src="https://m.media-amazon.com/images/I/51k0qRQFcuL.jpg">
<h3>iPhone 17 Pro Max</h3>
<div class="price">$1299</div>
<button onclick="add('iPhone 17 Pro Max',1299)">Add</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/51QPBmoc8FL.jpg">
<h3>MacBook A18 Pro</h3>
<div class="price">$1299</div>
<button onclick="add('MacBook A18 Pro',1299)">Add</button>
</div>

</div>

<div class="cart">
🛒 Cart: <span id="count">0</span><br>
Total: $<span id="total">0</span>

<button class="pay" onclick="checkout()">Checkout</button>
<button class="clear" onclick="clearCart()">Clear</button>
</div>

<!-- PAYMENT MODAL -->
<div id="payBox">
<div class="payInner">

<h3>درگاه تستی شاپرک</h3>

<div id="payInfo"></div>

<input placeholder="شماره کارت" style="width:100%;padding:8px;margin:5px 0;">
<input placeholder="CVV2" style="width:100%;padding:8px;margin:5px 0;">
<input placeholder="رمز پویا" style="width:100%;padding:8px;margin:5px 0;">

<button onclick="doPay()" style="width:100%;padding:10px;background:green;color:white;border:none;border-radius:8px;">
پرداخت
</button>

<button onclick="closePay()" style="width:100%;padding:10px;margin-top:5px;">
انصراف
</button>

<div id="success" style="display:none;color:green;margin-top:10px;">
✅ پرداخت موفق (تستی)
</div>

</div>
</div>

<script>

let cart=[];

/* ADD */
function add(name,price){
cart.push({name,price});
update();
}

/* UPDATE */
function update(){
document.getElementById("count").innerText=cart.length;

let t=0;
cart.forEach(i=>t+=i.price);

document.getElementById("total").innerText=t;
}

/* CLEAR */
function clearCart(){
cart=[];
update();
}

/* CHECKOUT */
function checkout(){
if(cart.length===0){
alert("Cart is empty!");
return;
}

let total=0;
cart.forEach(i=>total+=i.price);

document.getElementById("payInfo").innerText="Total Payment: $"+total;
document.getElementById("payBox").style.display="block";
}

/* CLOSE */
function closePay(){
document.getElementById("payBox").style.display="none";
document.getElementById("success").style.display="none";
}

/* PAY */
function doPay(){
document.getElementById("success").style.display="block";

setTimeout(()=>{
alert("Payment Successful (Demo)");
cart=[];
update();
closePay();
},1500);
}

/* SEARCH */
function searchProducts(){
let input=document.querySelector(".search").value.toLowerCase();
let cards=document.querySelectorAll(".card");

cards.forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(input)?"block":"none";
});
}

</script>

</body>
</html>
