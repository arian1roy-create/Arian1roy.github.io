<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Store</title>

<style>
body{
margin:0;
font-family:tahoma;
background:#f5f5f5;
}

.header{
position:sticky;
top:0;
background:#fff;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #ddd;
}

.langBtn{
background:#111;
color:#fff;
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
}

.back{
display:none;
background:#111;
color:#fff;
border:none;
padding:5px 10px;
border-radius:6px;
cursor:pointer;
}

.container{
padding:10px;
padding-bottom:180px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

/* CATEGORY */
.category{
background:#fff;
padding:25px;
border-radius:12px;
text-align:center;
font-size:18px;
cursor:pointer;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* PRODUCT */
.card{
background:#fff;
border-radius:12px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
height:90px;
object-fit:contain;
}

.price{
color:#e60012;
font-weight:bold;
}

button{
background:#e60012;
color:#fff;
border:none;
padding:6px;
border-radius:8px;
width:100%;
margin-top:5px;
cursor:pointer;
}

/* CART */
.cartBar{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
color:#fff;
padding:10px;
}

.payBtn{background:#25D366;}
.clearBtn{background:#444;}

/* PAYMENT MODAL (مثل نسخه قبلی تو) */
#payBox{
display:none;
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;
z-index:999;
}

.payInner{
background:#fff;
width:90%;
max-width:320px;
border-radius:12px;
padding:15px;
text-align:center;
}

.cardIcon{
font-size:40px;
margin-bottom:10px;
}

.tgBtn{
background:#229ED9;
color:#fff;
border:none;
padding:10px;
border-radius:8px;
width:100%;
margin-top:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<button class="back" id="backBtn" onclick="goBack()">⬅</button>
<div>🛍 AR Store</div>
<button class="langBtn" onclick="toggleLang()">🌐</button>
</div>

<div class="container" id="app"></div>

<!-- CART -->
<div class="cartBar">
🛒 <span id="count">0</span>
<br>
Total: $<span id="total">0</span>

<button class="payBtn" onclick="openPay()">Checkout</button>
<button class="clearBtn" onclick="clearCart()">Clear</button>
</div>

<!-- PAYMENT (OLD STYLE RESTORED) -->
<div id="payBox">
<div class="payInner">

<div class="cardIcon">💳</div>
<div style="margin-bottom:10px;font-weight:bold;">
Telegram Payment
</div>

<button class="tgBtn" onclick="goTelegram()">
📲 Pay via Telegram
</button>

<button class="payBtn" onclick="fakePay()">Pay Now</button>
<button class="clearBtn" onclick="closePay()">Close</button>

</div>
</div>

<script>

let page="home";
let cart=[];
let lang="en";

let data={
cars:[
{name:"BMW M5",price:80000,img:"https://via.placeholder.com/300"},
{name:"Toyota Supra",price:60000,img:"https://via.placeholder.com/300"}
],
phones:[
{name:"iPhone 15",price:1200,img:"https://via.placeholder.com/300"},
{name:"Samsung S24",price:1100,img:"https://via.placeholder.com/300"}
],
laptops:[
{name:"MacBook Pro M3",price:2200,img:"https://via.placeholder.com/300"}
],
imac:[
{name:"iMac 2026",price:1800,img:"https://via.placeholder.com/300"}
],
beds:[
{name:"Luxury Bed",price:500,img:"https://via.placeholder.com/300"}
]
};

let t={
en:{cars:"🚗 Cars",phones:"📱 Phones",laptops:"💻 Laptops",imac:"🖥 iMac",beds:"🛏 Beds",add:"Add"},
fa:{cars:"🚗 ماشین",phones:"📱 موبایل",laptops:"💻 لپ‌تاپ",imac:"🖥 آی‌مک",beds:"🛏 تخت",add:"افزودن"}
};

/* HOME */

function renderHome(){
page="home";
document.getElementById("backBtn").style.display="none";

document.getElementById("app").innerHTML=`

<div style="background:#111;color:white;padding:20px;border-radius:15px;text-align:center;margin-bottom:15px;">
<h2>🛍 AR Store</h2>
<p>${lang==="en" ? "Buy & Sell Everything" : "خرید و فروش همه چیز"}</p>
</div><div style="margin-bottom:15px;">
<input
type="text"
placeholder="${lang==="en" ? "Search products..." : "جستجوی محصولات..."}"
style="width:100%;padding:12px;border-radius:12px;border:1px solid #ddd;box-sizing:border-box;font-size:16px;">
</div><div class="grid"><div class="category" onclick="openCat('cars')">
🚗<br>${t[lang].cars}
</div><div class="category" onclick="openCat('phones')">
📱<br>${t[lang].phones}
</div><div class="category" onclick="openCat('laptops')">
💻<br>${t[lang].laptops}
</div><div class="category" onclick="openCat('imac')">
🖥<br>${t[lang].imac}
</div><div class="category" onclick="openCat('beds')">
🛏<br>${t[lang].beds}
</div></div><h3 style="margin-top:20px;">
${lang==="en" ? "🔥 Popular Products" : "🔥 محصولات محبوب"}
</h3><div class="grid"><div class="card">
<img src="https://m.media-amazon.com/images/I/61bK6PMOC3L._AC_SL1500_.jpg">
<h3>iPhone 15 Pro</h3>
<div class="price">$1200</div>
</div><div class="card">
<img src="https://m.media-amazon.com/images/I/61L5QgPvgqL._AC_SL1500_.jpg">
<h3>MacBook Pro</h3>
<div class="price">$2200</div>
</div></div>`;
}
/* CATEGORY */
function openCat(cat){
page=cat;
document.getElementById("backBtn").style.display="block";

let html=`<div class="grid">`;

data[cat].forEach(p=>{
html+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<div class="price">$${p.price}</div>
<button onclick="add('${p.name}',${p.price})">${t[lang].add}</button>
</div>`;
});

html+=`</div>`;
document.getElementById("app").innerHTML=html;
}

/* CART */
function add(name,price){
cart.push({name,price});
update();
}

function update(){
document.getElementById("count").innerText=cart.length;

let total=0;
cart.forEach(i=>total+=i.price);
document.getElementById("total").innerText=total;
}

function clearCart(){
cart=[];
update();
}

/* PAYMENT */
function openPay(){
if(cart.length===0){
alert("Cart empty");
return;
}
document.getElementById("payBox").style.display="flex";
}

function closePay(){
document.getElementById("payBox").style.display="none";
}

function fakePay(){
alert("Payment Success (Demo)");
}

/* TELEGRAM (OLD STYLE) */
function goTelegram(){

let text="🛒 Order\n\n";
let total=0;

cart.forEach(i=>{
text+="• "+i.name+" - $"+i.price+"\n";
total+=i.price;
});

text+="\n💰 Total: $"+total;

window.location.href =
"https://t.me/iphonearian?text=" + encodeURIComponent(text);
}

/* BACK */
function goBack(){
renderHome();
}

/* LANGUAGE */
function toggleLang(){
lang = (lang==="en") ? "fa" : "en";
renderHome();
}

renderHome();

</script>

</body>
</html>
