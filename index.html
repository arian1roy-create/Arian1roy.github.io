<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Store</title>

<style>
html, body{overflow-x:hidden;}
*{box-sizing:border-box;}

body{margin:0;font-family:tahoma;background:#f5f5f5;}

.header{position:sticky;top:0;background:#fff;padding:10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #ddd;}

.langBtn{background:#111;color:#fff;border:none;padding:6px 10px;border-radius:8px;cursor:pointer;}

.back{display:none;background:#111;color:#fff;border:none;padding:5px 10px;border-radius:6px;cursor:pointer;}

.container{padding:10px;padding-bottom:180px;}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}

.category{background:#fff;padding:25px;border-radius:12px;text-align:center;font-size:18px;cursor:pointer;box-shadow:0 2px 5px rgba(0,0,0,0.1);}

.card{background:#fff;border-radius:12px;padding:10px;text-align:center;}

.card img{width:100%;height:90px;object-fit:contain;}

.price{color:#e60012;font-weight:bold;}

button{background:#e60012;color:#fff;border:none;padding:6px;border-radius:8px;width:100%;margin-top:5px;cursor:pointer;}

.cartBar{position:fixed;bottom:0;left:0;right:0;background:#111;color:#fff;padding:10px;}

.payBtn{background:#25D366;}
.clearBtn{background:#444;}

#payBox{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);justify-content:center;align-items:center;z-index:999;}

.payInner{background:#fff;width:90%;max-width:320px;border-radius:12px;padding:15px;text-align:center;}

.cardIcon{font-size:40px;margin-bottom:10px;}

.tgBtn{background:#229ED9;color:#fff;border:none;padding:10px;border-radius:8px;width:100%;margin-top:8px;cursor:pointer;}

/* 🔥 SLIDER FIXED */
.heroSlider{
  width:100%;
  height:180px;
  border-radius:15px;
  overflow:hidden;
  margin-bottom:15px;
  position:relative;
}

.heroSlider img{
  width:100%;
  height:100%;
  object-fit:cover;
  position:absolute;
  top:0;
  left:0;
  opacity:0;
  transition: opacity 2s ease-in-out;
}

.heroSlider img.active{
  opacity:1;
}
</style>
</head>

<body>

<div class="header">
<button class="back" id="backBtn" onclick="goBack()">⬅</button>
<div>🛍 AR Store</div>
<button class="langBtn" onclick="toggleLang()">🌐</button>
</div>

<div class="container" id="app"></div>

<div class="cartBar">
🛒 <span id="count">0</span><br>
Total: $<span id="total">0</span>
<button class="payBtn" onclick="openPay()">Checkout</button>
<button class="clearBtn" onclick="clearCart()">Clear</button>
</div>

<div id="payBox">
<div class="payInner">
<div class="cardIcon">💳</div>
<div style="margin-bottom:10px;font-weight:bold;">Telegram Payment</div>
<button class="tgBtn" onclick="goTelegram()">📲 Pay via Telegram</button>
<button class="payBtn" onclick="fakePay()">Pay Now</button>
<button class="clearBtn" onclick="closePay()">Close</button>
</div>
</div>

<script>

let page="home";
let cart=[];
let lang="en";

/* DATA */
let data={
cars:Array.from({length:20},(_,i)=>({name:"Car "+(i+1),price:50000+i*1500,img:"https://via.placeholder.com/300"})),
phones:Array.from({length:20},(_,i)=>({name:"Phone "+(i+1),price:800+i*40,img:"https://via.placeholder.com/300"})),
laptops:Array.from({length:20},(_,i)=>({name:"Laptop "+(i+1),price:1200+i*80,img:"https://via.placeholder.com/300"})),
imac:Array.from({length:15},(_,i)=>({name:"iMac "+(i+1),price:1500+i*100,img:"https://via.placeholder.com/300"})),
beds:Array.from({length:15},(_,i)=>({name:"Bed "+(i+1),price:300+i*30,img:"https://via.placeholder.com/300"}))
};

let t={
en:{cars:"🚗 Cars",phones:"📱 Phones",laptops:"💻 Laptops",imac:"🖥 iMac",beds:"🛏 Beds",add:"Add"},
fa:{cars:"🚗 ماشین",phones:"📱 موبایل",laptops:"💻 لپ‌تاپ",imac:"🖥 آی‌مک",beds:"🛏 تخت",add:"افزودن"}
};

let sliderIndex = 0;
let sliderStarted = false;

/* HOME */
function renderHome(){
page="home";
document.getElementById("backBtn").style.display="none";

document.getElementById("app").innerHTML=`
<div class="heroSlider">
  <img class="active" src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
  <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
  <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">
</div>

<div class="grid">
<div class="category" onclick="openCat('cars')">🚗<br>${t[lang].cars}</div>
<div class="category" onclick="openCat('phones')">📱<br>${t[lang].phones}</div>
<div class="category" onclick="openCat('laptops')">💻<br>${t[lang].laptops}</div>
<div class="category" onclick="openCat('imac')">🖥<br>${t[lang].imac}</div>
<div class="category" onclick="openCat('beds')">🛏<br>${t[lang].beds}</div>
</div>
`;

startSlider(); // 🔥 مهم
}

/* SLIDER */
function startSlider(){
const imgs = document.querySelectorAll(".heroSlider img");
if(imgs.length === 0) return;

if(sliderStarted) return;
sliderStarted = true;

setInterval(()=>{
imgs[sliderIndex].classList.remove("active");
sliderIndex = (sliderIndex + 1) % imgs.length;
imgs[sliderIndex].classList.add("active");
}, 3000);
}

/* CATEGORY */
function openCat(cat){
page=cat;
document.getElementById("backBtn").style.display="block";

let html=`<div class="grid">`;
data[cat].forEach(p=>{
html+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<div class="price">$${p.price}</div>
<button onclick="add('${p.name}',${p.price})">${t[lang].add}</button>
</div>`;
});
html+=`</div>`;
document.getElementById("app").innerHTML=html;
}

/* CART */
function add(n,p){cart.push({name:n,price:p});update();}
function update(){
document.getElementById("count").innerText=cart.length;
let t=0;cart.forEach(i=>t+=i.price);
document.getElementById("total").innerText=t;
}
function clearCart(){cart=[];update();}

/* PAY */
function openPay(){if(cart.length===0){alert("Cart empty");return;}
document.getElementById("payBox").style.display="flex";}
function closePay(){document.getElementById("payBox").style.display="none";}
function fakePay(){alert("Payment Success");}

/* TELEGRAM */
function goTelegram(){
let text="🛒 Order\n\n";let total=0;
cart.forEach(i=>{text+="• "+i.name+" - $"+i.price+"\n";total+=i.price;});
text+="\n💰 Total: $"+total;
window.location.href="https://t.me/iphonearian?text="+encodeURIComponent(text);
}

function goBack(){renderHome();}
function toggleLang(){lang=(lang==="en")?"fa":"en";renderHome();}

renderHome();

</script>

</body>
</html>
