<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Store</title>

<style>
body{
margin:0;
font-family:tahoma;
background:#f5f5f5;
}

.header{
position:sticky;
top:0;
background:#fff;
display:flex;
align-items:center;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #ddd;
}

.logo{
font-size:18px;
font-weight:bold;
color:#e60012;
}

.search{
flex:1;
margin:0 10px;
padding:8px;
border:1px solid #ddd;
border-radius:8px;
}

.lang{
background:#111;
color:#fff;
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#fff;
border-radius:12px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
height:130px;
object-fit:contain;
}

.price{
color:#e60012;
font-weight:bold;
}

.card button{
background:#e60012;
color:#fff;
border:none;
padding:6px;
border-radius:8px;
width:100%;
cursor:pointer;
}

.cart{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
color:#fff;
padding:10px;
}

.pay,.clear{
width:100%;
padding:10px;
border:none;
border-radius:8px;
color:white;
margin-top:5px;
cursor:pointer;
}

.pay{background:#25D366}
.clear{background:#444}

/* PAYMENT */
#payBox{
display:none;
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.4);
z-index:999;
align-items:center;
justify-content:center;
}

.payInner{
background:#fff;
width:90%;
max-width:320px;
padding:15px;
border-radius:12px;
text-align:center;
}

#payItems{
text-align:right;
font-size:13px;
margin:10px 0;
}

.tgBtn{
background:#229ED9;
color:white;
border:none;
padding:10px;
border-radius:8px;
width:100%;
margin-top:5px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">

<div class="logo" id="logo">🛍 AR Store</div>

<input class="search" id="search" placeholder="Search...">

<button class="lang" onclick="toggleLang()">🌐</button>

</div>

<div class="products">

<div class="card">
<img src="https://m.media-amazon.com/images/I/51k0qRQFcuL.jpg">
<h3>iPhone 17 Pro Max</h3>
<div class="price">$1299</div>
<button onclick="add('iPhone 17 Pro Max',1299)">Add</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/51QPBmoc8FL.jpg">
<h3>MacBook A18 Pro</h3>
<div class="price">$1299</div>
<button onclick="add('MacBook A18 Pro',1299)">Add</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/61RGZdmKzRL.jpg">
<h3>Apple Watch Ultra 4</h3>
<div class="price">$799</div>
<button onclick="add('Apple Watch Ultra 4',799)">Add</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/51C8kxOdz-L.jpg">
<h3>iMac Pro 2026</h3>
<div class="price">$1799</div>
<button onclick="add('iMac Pro 2026',1799)">Add</button>
</div>

</div>

<div class="cart">

🛒 <span id="count">0</span><br>

Total: $<span id="total">0</span>

<button class="pay" onclick="openPay()">Checkout</button>
<button class="clear" onclick="clearCart()">Clear</button>

</div>

<!-- PAYMENT -->
<div id="payBox">
<div class="payInner">

<h3 id="payTitle">Payment</h3>

<div id="payItems"></div>

<strong>Total: $<span id="payTotal">0</span></strong>

<button class="tgBtn" onclick="goTelegram()">
📲 Pay via Telegram
</button>

<button class="pay" onclick="doPay()">
💳 Pay Now
</button>

<button class="clear" onclick="closePay()">Close</button>

</div>
</div>

<script>

let cart=[];
let lang="en";

/* ADD */
function add(name,price){
cart.push({name,price});
update();
}

/* UPDATE */
function update(){
document.getElementById("count").innerText=cart.length;

let total=0;
cart.forEach(i=>total+=i.price);
document.getElementById("total").innerText=total;
}

/* CLEAR */
function clearCart(){
cart=[];
update();
}

/* OPEN PAY */
function openPay(){

if(cart.length===0){
alert(lang==="en"?"Cart empty":"سبد خرید خالی است");
return;
}

document.getElementById("payBox").style.display="flex";

let html="";
let total=0;

cart.forEach(i=>{
html+="• "+i.name+" - $"+i.price+"<br>";
total+=i.price;
});

document.getElementById("payItems").innerHTML=html;
document.getElementById("payTotal").innerText=total;
}

/* CLOSE */
function closePay(){
document.getElementById("payBox").style.display="none";
}

/* FAKE PAY */
function doPay(){
alert("Payment Success (Demo)");
}

/* TELEGRAM */
function goTelegram(){

let text="🛒 Order\n\n";
let total=0;

cart.forEach(i=>{
text+="• "+i.name+" - $"+i.price+"\n";
total+=i.price;
});

text+="\n💰 Total: $"+total;

window.location.href =
"https://t.me/iphonearian?text=" + encodeURIComponent(text);
}

/* ✅ FIXED LANGUAGE (FULL WORKING) */
function toggleLang(){

if(lang==="en"){
lang="fa";

document.getElementById("logo").innerText="🛍 فروشگاه AR";
document.getElementById("search").placeholder="جستجو...";

document.querySelectorAll(".card button").forEach(b=>{
b.innerText="افزودن";
});

document.querySelector(".pay").innerText="پرداخت";
document.querySelector(".clear").innerText="پاک کردن";
document.getElementById("payTitle").innerText="پرداخت";

}else{
lang="en";

document.getElementById("logo").innerText="🛍 AR Store";
document.getElementById("search").placeholder="Search...";

document.querySelectorAll(".card button").forEach(b=>{
b.innerText="Add";
});

document.querySelector(".pay").innerText="Checkout";
document.querySelector(".clear").innerText="Clear";
document.getElementById("payTitle").innerText="Payment";
}
}

</script>

</body>
</html>
