<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فروشگاه آریان روی</title>

<style>
body{
margin:0;
font-family:tahoma;
background:#f4f4f4;
}

/* TOP */
.topbar{
background:#111;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.lang-btn button{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.hero{
text-align:center;
background:#111;
padding:15px;
}

.hero img{
width:180px;
animation:pulse 0.4s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:15px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
text-align:center;
text-decoration:none;
color:black;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:160px;
object-fit:contain;
}

.card h3{
margin:10px 0;
font-size:14px;
}

.btn{
display:inline-block;
margin-bottom:10px;
padding:6px 12px;
background:black;
color:white;
border-radius:8px;
font-size:12px;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
<span id="title">فروشگاه آریان روی</span>

<div class="lang-btn">
<button onclick="setLang('fa')">FA</button>
<button onclick="setLang('en')">EN</button>
</div>
</div>

<!-- LOGO -->
<div class="hero">
<img src="file_00000000bfec720a9ea8aa8800b40ffb.png">
</div>

<!-- PRODUCTS -->
<section class="products">

<a class="card" href="iphone.html">
<img src="https://m.media-amazon.com/images/I/51k0qRQFcuL.jpg">
<h3 id="iphone">آیفون 17 پرو مکس</h3>
<div class="btn" id="view1">مشاهده</div>
</a>

<a class="card" href="macbook.html">
<img src="https://m.media-amazon.com/images/I/51QPBmoc8FL.jpg">
<h3 id="mac">مک‌بوک A18 پرو</h3>
<div class="btn" id="view2">مشاهده</div>
</a>

<a class="card" href="watch.html">
<img src="https://m.media-amazon.com/images/I/61RGZdmKzRL.jpg">
<h3 id="watch">اپل واچ اولترا 4</h3>
<div class="btn" id="view3">مشاهده</div>
</a>

<a class="card" href="imac.html">
<img src="https://m.media-amazon.com/images/I/51C8kxOdz-L.jpg">
<h3 id="imac">آی‌مک پرو 2026</h3>
<div class="btn" id="view4">مشاهده</div>
</a>

</section>

<!-- CART -->
<div id="cartBar">

<div id="overlay" onclick="closeCart()" style="
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.5);
display:none;
z-index:99;"></div>

<div onclick="toggleCart()" style="
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
z-index:100;
font-weight:bold;
">
🛒 <span id="cartText">سبد خرید</span> (<span id="count">0</span>)
</div>

<div id="cartBody" style="
display:none;
position:fixed;
bottom:50px;
left:0;
right:0;
background:#1a1a1a;
color:white;
padding:10px;
z-index:101;
max-height:60vh;
overflow:auto;
">

<div id="cartItems"></div>

<p>💰 Total: $<span id="total">0</span></p>

<button onclick="checkout()" style="
width:100%;
padding:12px;
background:#25D366;
color:white;
border:none;
border-radius:10px;
font-weight:bold;">
Checkout Telegram
</button>

<button onclick="clearCart()" style="
width:100%;
padding:10px;
margin-top:5px;
background:#444;
color:white;
border:none;
border-radius:10px;">
Clear Cart
</button>

</div>
</div>

<script src="cart.js"></script>

<script>
function toggleCart(){
let b=document.getElementById("cartBody");
b.style.display=b.style.display==="block"?"none":"block";
}

const texts={
fa:{
title:"فروشگاه آریان روی",
iphone:"آیفون 17 پرو مکس",
mac:"مک‌بوک A18 پرو",
watch:"اپل واچ اولترا 4",
imac:"آی‌مک پرو 2026",
view:"مشاهده",
cart:"سبد خرید",
checkout:"پرداخت تلگرام",
clear:"خالی کردن"
},
en:{
title:"Arian Roy Store",
iphone:"iPhone 17 Pro Max",
mac:"MacBook A18 Pro",
watch:"Apple Watch Ultra 4",
imac:"iMac Pro 2026",
view:"View",
cart:"Cart",
checkout:"Checkout Telegram",
clear:"Clear Cart"
}
};

function setLang(lang){
document.getElementById("title").innerText=texts[lang].title;
document.getElementById("iphone").innerText=texts[lang].iphone;
document.getElementById("mac").innerText=texts[lang].mac;
document.getElementById("watch").innerText=texts[lang].watch;
document.getElementById("imac").innerText=texts[lang].imac;

document.getElementById("view1").innerText=texts[lang].view;
document.getElementById("view2").innerText=texts[lang].view;
document.getElementById("view3").innerText=texts[lang].view;
document.getElementById("view4").innerText=texts[lang].view;

document.getElementById("cartText").innerText=texts[lang].cart;
}
</script>

</body>
</html>
